version: 1.1

source: nike_databricks.cpg_supply_chain.fact_inventory

joins:
  - name: warehouse
    source: nike_databricks.cpg_supply_chain.dim_warehouse
    "on": source.warehouse_id = warehouse.warehouse_id
  - name: product
    source: nike_databricks.cpg_supply_chain.dim_product
    "on": source.product_id = product.product_id
  - name: date
    source: nike_databricks.cpg_supply_chain.dim_date
    "on": source.date_id = date.date_id

comment: "Inventory semantic layer: semi-additive stock snapshots, health signals,\
  \ and days-of-supply for the supply-chain knowledge graph."

dimensions:
  - name: snapshot_date
    expr: date.full_date
  - name: snapshot_month
    expr: "date_trunc('month', date.full_date)"
  - name: warehouse_name
    expr: warehouse.warehouse_name
  - name: warehouse_type
    expr: warehouse.type
  - name: warehouse_region
    expr: warehouse.region
  - name: product_category
    expr: product.category
  - name: product_brand
    expr: product.brand
  - name: product_sku
    expr: product.sku

measures:
  - name: current_stock_on_hand
    expr: SUM(source.stock_on_hand)
    window:
      - order: snapshot_date
        semiadditive: last
        range: current
    comment: "SEMI-ADDITIVE: sums across product and warehouse, but takes the LAST\
      \ value across time. Querying across a date range returns the latest snapshot\
      \ per (warehouse, product) — never a sum of daily snapshots. Foundational for\
      \ all downstream inventory analytics."
    synonyms:
      - inventory
      - stock level
      - on hand
      - available stock
      - soh
  - name: stockout_incidence_rate_pct
    expr: "100.0 * SUM(source.stockout_flag) / NULLIF(COUNT(source.inventory_id),\
      \ 0)"
    comment: "Non-additive: percentage of snapshot records in a stockout state. Primary\
      \ KPI for shelf-availability risk on the (Warehouse)-[:HAS_STOCK]->(Product)\
      \ edge."
    synonyms:
      - stockout rate
      - oos rate
      - out of stock percentage
      - availability gap
  - name: days_of_supply
    expr: "SUM(source.stock_on_hand) / NULLIF(SUM(source.safety_stock), 0)"
    window:
      - order: snapshot_date
        semiadditive: last
        range: current
    comment: Coverage ratio of current stock to safety-stock baseline (proxy for daily
      demand). Values below 7 are auto-flagged by the Recommendation Agent to trigger
      replenishment suggestions.
    synonyms:
      - dos
      - days of cover
      - inventory cover
      - coverage days
      - forward cover
  - name: rolling_14day_avg_stock
    expr: AVG(source.stock_on_hand)
    window:
      - order: snapshot_date
        semiadditive: last
        range: trailing 14 day
    comment: "Trailing 14-day average stock position per (sku, warehouse). Denoises\
      \ daily snapshots for trend detection. Used by the Learning Agent to evaluate\
      \ recommendation drift."
    synonyms:
      - avg inventory
      - rolling stock position
      - 14 day stock average
  - name: inventory_health_index
    expr: "0.5 * (1.0 - (SUM(source.stockout_flag) / NULLIF(COUNT(source.inventory_id),\
      \ 0))) + 0.3 * (1.0 - (SUM(source.overstock_flag) / NULLIF(COUNT(source.inventory_id),\
      \ 0))) + 0.2 * LEAST(1.0, SUM(source.stock_on_hand) / NULLIF(SUM(source.reorder_point)\
      \ * 1.5, 0))"
    comment: "Composite 0-1 edge weight on (Warehouse)-[:HAS_STOCK]->(Product): 50%\
      \ stockout avoidance, 30% overstock avoidance, 20% coverage vs 1.5x reorder\
      \ point. Drives rebalancing recommendations and downstream impact quantification."
    synonyms:
      - stock health
      - inventory score
      - stocking quality
      - inventory kpi