# =============================================================================
# Metric View: mv_fact_procurement
# -----------------------------------------------------------------------------
# Semantic lens over FACT_PROCUREMENT for the CPG supply-chain ontology layer.
#
# Ontology mapping:
#   - Feeds the (Vendor)-[:SUPPLIES]->(Product) edge in the knowledge graph.
#   - `vendor_criticality_score` is intended as a VERTEX weight for Vendor
#     nodes, consumed by the Root Cause Analysis Agent during weighted graph
#     traversal (Anomaly -> Shipment -> Warehouse -> Plant -> Product -> Vendor).
#   - `vendor_delivery_reliability_pct` feeds the Anomaly Detection Agent
#     as a primary signal for "vendor unreliability".
#
# Consumers:
#   - Anomaly Detection Agent  (reliability thresholding, lead-time drift)
#   - Root Cause Analysis Agent (criticality weighting during traversal)
#   - Recommendation Agent     (alternate-vendor suggestion scoring)
# =============================================================================

version: 1.1
source: cpg_supply_chain.gold_fact.fact_procurement
comment: "Procurement semantic layer: vendor spend, reliability, and criticality signals feeding the supply-chain knowledge graph."

# ----- Star-schema joins to conformed dimensions ---------------------------
joins:
  - name: vendor
    source: cpg_supply_chain.gold_dim.dim_vendor
    on: source.vendor_id = vendor.vendor_id

  - name: product
    source: cpg_supply_chain.gold_dim.dim_product
    on: source.product_id = product.product_id

  - name: warehouse
    source: cpg_supply_chain.gold_dim.dim_warehouse
    on: source.warehouse_id = warehouse.warehouse_id

  - name: date
    source: cpg_supply_chain.gold_dim.dim_date
    on: source.date_id = date.date_id

# ----- Dimensions (grain + hierarchies for agent-driven drill-down) --------
dimensions:
  - name: order_date
    expr: date.full_date
    display_name: "Order Date"
    comment: "Calendar date the purchase order was placed."
    synonyms: ["po date", "procurement date", "order placed on"]

  - name: order_month
    expr: DATE_TRUNC('MONTH', date.full_date)
    display_name: "Order Month"

  - name: vendor_name
    expr: vendor.vendor_name
    display_name: "Vendor"
    synonyms: ["supplier", "supplier name"]

  - name: vendor_tier
    expr: vendor.tier
    display_name: "Vendor Tier"
    synonyms: ["supplier tier", "strategic tier"]

  - name: vendor_region
    expr: vendor.region
    display_name: "Vendor Region"

  - name: product_category
    expr: product.category
    display_name: "Category"

  - name: product_brand
    expr: product.brand
    display_name: "Brand"

  - name: warehouse_region
    expr: warehouse.region
    display_name: "Destination Region"

  - name: po_status
    expr: source.status
    display_name: "PO Status"

# ----- Measures: simple -> complex -----------------------------------------
measures:

  # [1] ADDITIVE --- simple SUM, the starting point.
  # Total procurement spend, fully additive across every dimension.
  # Agent use: magnitude signal — drives spend-concentration risk queries.
  - name: total_procurement_spend
    expr: SUM(source.total_cost)
    display_name: "Total Procurement Spend"
    comment: "Fully-additive sum of total_cost across all POs. Baseline magnitude metric for vendor spend concentration and category-level exposure analysis."
    synonyms: ["procurement cost", "total po value", "purchase spend", "supplier spend"]

  # [2] NON-ADDITIVE --- ratio metric, must recompute at each aggregation.
  # On-time fill rate at the line level: qty_delivered / qty_ordered.
  # Agent use: PRIMARY anomaly signal for "vendor unreliability".
  # Cannot be summed; Databricks Metric Views handle this correctly via MEASURE().
  - name: vendor_delivery_reliability_pct
    expr: 100.0 * SUM(source.quantity_delivered) / NULLIF(SUM(source.quantity_ordered), 0)
    display_name: "Vendor Delivery Reliability %"
    comment: "Non-additive ratio: delivered units as a percentage of ordered units. Feeds the Anomaly Detection Agent — sustained values < 95% flag unreliable vendors and trigger Root Cause traversal."
    synonyms: ["fill rate", "supplier reliability", "on time in full", "delivery reliability", "otif"]

  # [4] NON-ADDITIVE / WEIGHTED --- volume-weighted average lead time.
  # Straight AVG(lead_time_days) is wrong (ignores PO size); weight by quantity.
  # Agent use: lead-time drift detection; edge-weight input for graph shortest-path.
  - name: weighted_avg_lead_time_days
    expr: SUM(source.lead_time_days * source.quantity_delivered) / NULLIF(SUM(source.quantity_delivered), 0)
    display_name: "Weighted Avg Lead Time (days)"
    comment: "Volume-weighted average of actual lead time, weighted by quantity delivered. Prevents small-PO noise from skewing the average. Used as an edge weight on (Vendor)-[:SUPPLIES]->(Product) in the KG to power shortest-path replenishment routing."
    synonyms: ["lead time", "supplier lead time", "delivery days", "procurement lead time"]

  # [5] TIME METRIC (WINDOW / TRAILING) --- rolling 30-day spend trend.
  # Experimental window feature: trailing range for rolling aggregation.
  # Agent use: Learning Agent watches the delta between this and total_procurement_spend
  # across periods to detect spend-acceleration anomalies.
  - name: rolling_30day_spend
    expr: SUM(source.total_cost)
    display_name: "Rolling 30-Day Spend"
    comment: "Trailing 30-day sum of procurement spend. Time-series metric for detecting sudden spend acceleration or vendor over-reliance. Cannot be aggregated further across time — time context is fixed by the window."
    synonyms: ["30 day spend", "rolling spend", "monthly trailing spend"]
    window:
      - order: order_date
        range: trailing 30 day
        semiadditive: last

  # [6] COMPLEX / COMPOSITE --- KG vertex weight for Vendor nodes.
  # Blends spend magnitude, reliability, and lead-time adherence into a single
  # criticality score. Higher score = more critical vendor (risk + dependency).
  # Agent use: Root Cause Analysis Agent uses this as the vertex weight when
  # traversing back up the supply graph during anomaly explanation.
  # Weights (0.5/0.3/0.2) are starting points — the Learning Agent tunes them.
  - name: vendor_criticality_score
    expr: |
      0.5 * (SUM(source.total_cost) / NULLIF(MAX(SUM(source.total_cost)) OVER (), 0))
      + 0.3 * (1 - (SUM(source.quantity_delivered) / NULLIF(SUM(source.quantity_ordered), 0)))
      + 0.2 * LEAST(1.0, SUM(source.lead_time_days * source.quantity_delivered)
                         / NULLIF(SUM(source.quantity_delivered) * 30.0, 0))
    display_name: "Vendor Criticality Score"
    comment: "Composite 0-1 score blending normalized spend share (50%), under-delivery rate (30%), and lead-time stress vs a 30-day benchmark (20%). Serves as the VERTEX WEIGHT for Vendor nodes in the knowledge graph and is the primary scoring input to the Root Cause Analysis Agent."
    synonyms: ["vendor risk score", "supplier criticality", "vendor importance", "supplier risk index"]
